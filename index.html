<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Europal Optimizer Pro</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<h1>
Europal Optimizer Pro
</h1>



<div class="container">



<div class="panel">


<h2>
Eingabe
</h2>



<label>
Palette Länge (mm)
</label>

<input id="palletLength" value="1200">



<label>
Palette Breite (mm)
</label>

<input id="palletWidth" value="800">



<label>
Palette Höhe (mm)
</label>

<input id="palletHeight" value="150">





<label>
Karton Länge (mm)
</label>

<input id="boxLength" value="400">



<label>
Karton Breite (mm)
</label>

<input id="boxWidth" value="300">



<label>
Karton Höhe (mm)
</label>

<input id="boxHeight" value="200">





<label>
Max. Stapelhöhe (mm)
</label>

<input id="maxHeight" value="2200">





<button onclick="startOptimization()">

Optimieren

</button>



<hr>



<button onclick="showTop()">

Draufsicht

</button>



<button onclick="showLayer(1)">

Lage 1

</button>



<button onclick="showLayer(2)">

Lage 2

</button>



<button onclick="show3D()">

3D Ansicht

</button>



</div>







<div class="view">


<canvas id="canvas"></canvas>


</div>



</div>





<script src="optimizer.js"></script>

<script src="canvas.js"></script>

<script src="app.js"></script>


</body>


</html>
