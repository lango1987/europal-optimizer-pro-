<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Europal Optimizer Pro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>
Europal Optimizer Pro
</h1>





<div class="container">



<!-- =========================
     Eingabe
========================= -->


<div class="panel">


<h2>
Paletten Eingabe
</h2>



<label>
Paletten Länge (mm)
</label>

<input 
id="palletLength"
type="number"
value="1200">





<label>
Paletten Breite (mm)
</label>

<input 
id="palletWidth"
type="number"
value="800">





<label>
Paletten Höhe (mm)
</label>

<input 
id="palletHeight"
type="number"
value="150">







<h2>
Karton Eingabe
</h2>



<label>
Karton Länge (mm)
</label>

<input
id="boxLength"
type="number"
value="400">





<label>
Karton Breite (mm)
</label>

<input
id="boxWidth"
type="number"
value="300">





<label>
Karton Höhe (mm)
</label>

<input
id="boxHeight"
type="number"
value="200">







<h2>
Stapel
</h2>




<label>
Maximale Höhe (mm)
</label>


<input
id="maxHeight"
type="number"
value="2200">







<button onclick="startOptimization()">

Optimierung starten

</button>





<hr>





<h2>
Ansicht
</h2>





<button onclick="showTop()">

Gesamte Palette

</button>





<button onclick="showLayer(1)">

Lage 1

</button>





<button onclick="showLayer(2)">

Lage 2

</button>





<button onclick="show3D()">

3D Ansicht

</button>





</div>









<!-- =========================
     Canvas
========================= -->


<div class="view">


<canvas id="canvas"></canvas>


</div>






</div>









<!-- =========================
     Scripts
========================= -->


<script src="optimizer.js"></script>

<script src="canvas.js"></script>

<script src="app.js"></script>



</body>

</html>
