<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Europal Optimizer Pro</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">


</head>


<body>


<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<span class="navbar-brand fs-3">

📦 Europal Optimizer Pro

</span>


</div>

</nav>





<div class="container-fluid mt-4">


<div class="row g-4">



<!-- Eingabe -->

<div class="col-lg-3">


<div class="card shadow">


<div class="card-body">


<h4>
Auftrag
</h4>



<label>
Palette
</label>


<select id="pallet" class="form-select mb-3">


<option value="euro">

Europalette 1200 x 800

</option>


<option value="industry">

Industriepalette 1200 x 1000

</option>


</select>





<label>
Länge
</label>

<input id="length"
class="form-control mb-2"
type="number">





<label>
Breite
</label>

<input id="width"
class="form-control mb-2"
type="number">





<label>
Höhe
</label>

<input id="height"
class="form-control mb-2"
type="number">





<label>
Gewicht
</label>

<input id="weight"
class="form-control mb-2"
type="number">





<label>
Max. Höhe
</label>

<input id="maxHeight"
class="form-control mb-3"
type="number"
value="1800">





<button id="calculate"
class="btn btn-primary w-100">

Optimieren

</button>



</div>

</div>


</div>







<!-- Hauptbereich -->

<div class="col-lg-9">



<div class="card shadow">


<div class="card-body">



<div class="d-flex justify-content-between">


<h4>

Visualisierung

</h4>



<div>


<button id="viewTop"
class="btn btn-primary">

Draufsicht

</button>



<button id="viewIso"
class="btn btn-outline-primary">

3D

</button>



<button id="viewLayer1"
class="btn btn-outline-primary">

Lage 1

</button>



<button id="viewLayer2"
class="btn btn-outline-primary">

Lage 2

</button>



</div>


</div>



<hr>



<canvas id="canvas"
width="1200"
height="700">

</canvas>



</div>

</div>





<!-- Kennzahlen -->

<div class="row mt-4 g-3">



<div class="col-md-3">

<div class="card text-center shadow">

<div class="card-body">

<h6>Kartons/Lage</h6>

<h2 id="layer">
0
</h2>

</div>

</div>

</div>





<div class="col-md-3">

<div class="card text-center shadow">

<div class="card-body">

<h6>Lagen</h6>

<h2 id="layers">
0
</h2>

</div>

</div>

</div>





<div class="col-md-3">

<div class="card text-center shadow">

<div class="card-body">

<h6>Gesamt</h6>

<h2 id="total">
0
</h2>

</div>

</div>

</div>





<div class="col-md-3">

<div class="card text-center shadow">

<div class="card-body">

<h6>Auslastung</h6>

<h2 id="utilization">
0%
</h2>

</div>

</div>

</div>



</div>







<!-- Varianten -->


<div class="card shadow mt-4">


<div class="card-body">


<h4>

Optimierungsvarianten

</h4>


<div id="variantList">

Noch keine Berechnung

</div>


</div>


</div>



</div>


</div>


</div>





<script src="config.js"></script>

<script src="patterns.js"></script>

<script src="optimizer.js"></script>

<script src="canvas.js"></script>

<script src="app.js"></script>


</body>

</html>
