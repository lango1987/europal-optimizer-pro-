<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Europal Optimizer Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">

    <div class="container-fluid">

        <span class="navbar-brand fw-bold fs-3">

            <i class="bi bi-box-seam-fill"></i>

            Europal Optimizer Pro

        </span>

        <div>

            <button class="btn btn-light me-2">
                <i class="bi bi-folder2-open"></i>
            </button>

            <button class="btn btn-light me-2">
                <i class="bi bi-file-earmark-pdf"></i>
            </button>

            <button class="btn btn-light me-2">
                <i class="bi bi-file-earmark-excel"></i>
            </button>

            <button class="btn btn-light">
                <i class="bi bi-gear"></i>
            </button>

        </div>

    </div>

</nav>

<div class="container-fluid mt-4">

    <div class="row g-4">

        <!-- ================================= -->
        <!-- Sidebar -->
        <!-- ================================= -->

        <div class="col-xl-3">

            <div class="card shadow border-0 rounded-4 h-100">

                <div class="card-body">

                    <h4 class="mb-4">

                        <i class="bi bi-clipboard-data"></i>

                        Auftrag

                    </h4>

                    <label class="form-label">
                        Palette
                    </label>

                    <select id="pallet"
                            class="form-select mb-3">

                        <option value="euro">
                            Europalette 1200 × 800
                        </option>

                        <option value="industry">
                            Industriepalette 1200 × 1000
                        </option>

                    </select>

                    <label class="form-label">
                        Kartonlänge (mm)
                    </label>

                    <input id="length"
                           type="number"
                           class="form-control mb-3">

                    <label class="form-label">
                        Kartonbreite (mm)
                    </label>

                    <input id="width"
                           type="number"
                           class="form-control mb-3">

                    <label class="form-label">
                        Kartonhöhe (mm)
                    </label>

                    <input id="height"
                           type="number"
                           class="form-control mb-3">

                    <label class="form-label">
                        Gewicht (kg)
                    </label>

                    <input id="weight"
                           type="number"
                           class="form-control mb-3">

                    <label class="form-label">
                        Maximale Stapelhöhe
                    </label>

                    <input id="maxHeight"
                           type="number"
                           class="form-control mb-4"
                           value="1800">

                    <button id="calculate"
                            class="btn btn-primary btn-lg w-100">

                        <i class="bi bi-magic"></i>

                        Optimierung starten

                    </button>

                </div>

            </div>

        </div>

        <!-- ================================= -->
        <!-- Hauptbereich -->
        <!-- ================================= -->

        <div class="col-xl-9">
                        <div class="row g-4">

                <!-- ================================= -->
                <!-- Visualisierung -->
                <!-- ================================= -->

                <div class="col-lg-9">

                    <div class="card shadow border-0 rounded-4 h-100">

                        <div class="card-body">

                            <div class="d-flex justify-content-between align-items-center mb-3">

                                <h4 class="mb-0">

                                    <i class="bi bi-box"></i>

                                    Visualisierung

                                </h4>

                                <div class="btn-group">

                                    <button id="viewTop"
                                            class="btn btn-primary viewButton">

                                        Draufsicht

                                    </button>

                                    <button id="viewIso"
                                            class="btn btn-outline-primary viewButton">

                                        Isometrisch

                                    </button>

                                    <button id="viewLayer1"
                                            class="btn btn-outline-primary viewButton">

                                        Lage 1

                                    </button>

                                    <button id="viewLayer2"
                                            class="btn btn-outline-primary viewButton">

                                        Lage 2

                                    </button>

                                </div>

                            </div>

                            <canvas id="canvas"
                                    width="1200"
                                    height="700">
                            </canvas>

                        </div>

                    </div>

                </div>

                <!-- ================================= -->
                <!-- Analyse -->
                <!-- ================================= -->

                <div class="col-lg-3">

                    <div class="card shadow border-0 rounded-4 h-100">

                        <div class="card-body">

                            <h4>

                                <i class="bi bi-graph-up-arrow"></i>

                                Analyse

                            </h4>

                            <hr>

                            <h2 id="rating"
                                class="text-success">

                                ★★★★★

                            </h2>

                            <p id="analysisText">

                                Noch keine Berechnung durchgeführt.

                            </p>

                            <hr>

                            <h6>Flächenauslastung</h6>

                            <div class="progress mb-3">

                                <div id="utilBar"
                                     class="progress-bar bg-success"
                                     style="width:0%">
                                </div>

                            </div>

                            <h6>Stabilität</h6>

                            <div class="progress mb-3">

                                <div id="stableBar"
                                     class="progress-bar bg-primary"
                                     style="width:0%">
                                </div>

                            </div>

                            <h6>Gewicht</h6>

                            <div class="progress">

                                <div id="weightBar"
                                     class="progress-bar bg-warning"
                                     style="width:0%">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- ================================= -->
            <!-- KPI Karten -->
            <!-- ================================= -->

            <div class="row mt-4 g-3">

                <div class="col-md-3">

                    <div class="card shadow border-0 rounded-4 text-center">

                        <div class="card-body">

                            <h6>Kartons / Lage</h6>

                            <h2 id="layer">0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow border-0 rounded-4 text-center">

                        <div class="card-body">

                            <h6>Lagen</h6>

                            <h2 id="layers">0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow border-0 rounded-4 text-center">

                        <div class="card-body">

                            <h6>Gesamt</h6>

                            <h2 id="total">0</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow border-0 rounded-4 text-center">

                        <div class="card-body">

                            <h6>Auslastung</h6>

                            <h2 id="utilization">0%</h2>

                        </div>

                    </div>

                </div>

            </div>
                        <!-- ================================= -->
            <!-- Optimierungsvarianten -->
            <!-- ================================= -->

            <div class="card shadow border-0 rounded-4 mt-4">

                <div class="card-body">

                    <h4>

                        <i class="bi bi-trophy-fill"></i>

                        Optimierungsvarianten

                    </h4>

                    <hr>

                    <div id="variantList">

                        Noch keine Berechnung durchgeführt.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ================================= -->
<!-- JavaScript -->
<!-- ================================= -->

<script src="config.js"></script>
<script src="patterns.js"></script>
<script src="optimizer.js"></script>
<script src="canvas.js"></script>
<script src="app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
