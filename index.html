<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europal Optimizer Pro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📦 Europal Optimizer Pro</h1>

        <div class="version">
            Version 1.0
        </div>
    </header>

    <main>

        <!-- Sidebar -->

        <aside class="sidebar">

            <h2>Berechnung</h2>

            <label for="pallet">
                Palette
            </label>

            <select id="pallet">

                <option value="euro">
                    Europalette 1200 × 800
                </option>

                <option value="industry">
                    Industriepalette 1200 × 1000
                </option>

            </select>

            <label for="length">
                Kartonlänge (mm)
            </label>

            <input
                id="length"
                type="number"
                placeholder="z.B. 300">

            <label for="width">
                Kartonbreite (mm)
            </label>

            <input
                id="width"
                type="number"
                placeholder="z.B. 200">

            <label for="height">
                Kartonhöhe (mm)
            </label>

            <input
                id="height"
                type="number"
                placeholder="z.B. 150">

            <label for="weight">
                Gewicht (kg)
            </label>

            <input
                id="weight"
                type="number"
                value="0">

            <label for="maxHeight">
                Maximale Stapelhöhe (mm)
            </label>

            <input
                id="maxHeight"
                type="number"
                value="1800">

            <button id="calculate">
                Optimieren
            </button>

        </aside>

        <!-- Inhalt -->

        <section class="content">

            <!-- Dashboard -->

            <section class="dashboard">

                <div class="card">

                    <h3>Kartons / Lage</h3>

                    <p id="layer">0</p>

                </div>

                <div class="card">

                    <h3>Lagen</h3>

                    <p id="layers">0</p>

                </div>

                <div class="card">

                    <h3>Gesamt</h3>

                    <p id="total">0</p>

                </div>

                <div class="card">

                    <h3>Auslastung</h3>

                    <p id="utilization">0 %</p>

                </div>

            </section>

            <!-- Canvas -->

            <section class="canvas-box">

                <canvas
                    id="canvas"
                    width="1100"
                    height="700">
                </canvas>

            </section>

            <!-- Varianten -->

            <section class="variants">

                <h2>Optimierungsvarianten</h2>

                <div id="variantList">

                    Noch keine Berechnung durchgeführt.

                </div>

            </section>

        </section>

    </main>

    <script src="config.js"></script>
    <script src="calculations.js"></script>
    <script src="patterns.js"></script>
    <script src="optimizer.js"></script>
    <script src="canvas.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>

</body>

</html>
